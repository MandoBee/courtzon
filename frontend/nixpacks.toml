# Coolify deployment configuration for CourtZon Frontend
# https://coolify.io/docs/configuration/nixpacks/

[variables]
NODE_ENV = "production"

[phases.setup]
nixPkgs = ["nodejs_22", "npm"]

[phases.install]
cmds = ["npm ci --ignore-scripts"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "nginx -g 'daemon off;'"

[variables.env]
NODE_ENV = "production"
