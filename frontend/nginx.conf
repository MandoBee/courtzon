user appuser;
pid /tmp/nginx.pid;
worker_processes auto;
error_log /proc/self/fd/2 warn;
events {
    worker_connections 1024;
}
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # ── Accept-header routing ──
    # API calls (fetch/XHR) send Accept: application/json, */*
    # Browser navigation sends Accept: text/html,...
    map $http_accept $is_api_request {
        default "api";
        "~text/html" "spa";
    }

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        include /etc/nginx/security-headers.conf;

        gzip on;
        gzip_types text/css application/javascript application/json image/svg+xml;
        gzip_min_length 256;
        gzip_vary on;

        location = /favicon.ico {
            rewrite ^ /favicon.svg last;
        }

        # Branding assets — long cache with fingerprinting via path
        location ~* ^/(favicon-.*\.png|icon-.*\.png|apple-touch-icon\.png|favicon\.svg|images/(favicon|site-logo).*\.svg|browserconfig\.xml|site\.webmanifest|manifest\.json)$ {
            expires 7d;
            include /etc/nginx/security-headers.conf;
            add_header Cache-Control "public, max-age=604800";
        }

        location /assets/ {
            expires 1y;
            include /etc/nginx/security-headers.conf;
            add_header Cache-Control "public, immutable";
        }

        location /api/ {
            proxy_pass http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        location /auth/ {
            proxy_pass http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        location = /admin                                       { try_files /index.html =404; }

        # SPA deep-link + API proxy: /admin/ serves both React pages and backend endpoints
        # Browser nav (Accept: text/html) → index.html; API calls (Accept: application/json) → backend
        location /admin/ {
            if ($is_api_request = "spa") { rewrite ^ /index.html last; }
            proxy_pass http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # All other API prefixes — mirrors vite.config.ts proxy config
        include /etc/nginx/api-proxy.conf;

        # WebSocket proxy for Socket.IO
        location /socket.io/ {
            proxy_pass http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        location / {
            try_files $uri $uri/ /index.html;
            include /etc/nginx/security-headers.conf;
            add_header Cache-Control "no-cache";
        }
    }
}
