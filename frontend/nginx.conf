server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ──
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self \"https://accept.paymob.com\" \"https://accept.paymobsandbox.com\")" always;
    # No HSTS / upgrade-insecure-requests here — this image serves plain HTTP on :80.
    # For TLS termination in production, set those headers on the reverse proxy (see nginx.prod.conf).

    # ── Content Security Policy ──
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' https://cdn.jsdelivr.net blob:;
        style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com blob:;
        img-src 'self' data: https: blob:;
        font-src 'self' data: https://fonts.gstatic.com https://fonts.googleapis.com https://cdn.jsdelivr.net;
        connect-src * data: blob: 'self' 'unsafe-inline';
https://accept.paymobsandbox.com https://cdn.jsdelivr.net;
        form-action 'self';
        frame-ancestors 'none';
        frame-src https://accept.paymob.com https://accept.paymobsandbox.com;
        manifest-src 'self' blob:;
        base-uri 'self';
    " always;

    # ── Gzip ──
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # ── Static assets with cache ──
    location = /favicon.ico {
        rewrite ^ /favicon.svg last;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self \"https://accept.paymob.com\" \"https://accept.paymobsandbox.com\")" always;
        add_header Content-Security-Policy "
            default-src 'self';
            script-src 'self' https://cdn.jsdelivr.net blob:;
            style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com blob:;
            img-src 'self' data: https: blob:;
            font-src 'self' data: https://fonts.gstatic.com https://fonts.googleapis.com https://cdn.jsdelivr.net;
		connect-src * data: blob: 'self' 'unsafe-inline';
https://accept.paymobsandbox.com https://cdn.jsdelivr.net;
            form-action 'self';
            frame-ancestors 'none';
            frame-src https://accept.paymob.com https://accept.paymobsandbox.com;
            manifest-src 'self' blob:;
            base-uri 'self';
        " always;
    }

    # ── API proxy (prefixes mirror frontend/vite.config.ts + /docs, /metrics) ──
    location ~ ^/(auth|organisations|organisation-types|org|branches|resources|sports|resource-types|amenities|banks|bank-branches|subscription-plans|subscription-features|bookings|marketplace|wallets|payments|settlements|rbac|roles|permissions|permission-modules|admin|feature-flags|user-roles|users|my|settings|countries|provinces|cities|currencies|languages|translations|player-levels|ads|upload|uploads|activities|community|cms|coaches|public|health|sidebar|ui-permissions|notifications|booking-invitations|cancellation-policies|matches|academies|tournaments|sessions|design-tokens|docs|openapi\.json|metrics)(/|$|\?) {
        proxy_pass http://mst7w2pk5lx2cpf1d1s6yitc.187.127.72.93.sslip.io;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self \"https://accept.paymob.com\" \"https://accept.paymobsandbox.com\")" always;
        add_header Content-Security-Policy "
            default-src 'self';
            script-src 'self' https://cdn.jsdelivr.net blob:;
            style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com blob:;
            img-src 'self' data: https: blob:;
        font-src 'self' data: https://fonts.gstatic.com https://fonts.googleapis.com https://cdn.jsdelivr.net;
        connect-src * data: blob: 'self' 'unsafe-inline';
 https://accept.paymobsandbox.com https://cdn.jsdelivr.net;
            form-action 'self';
            frame-ancestors 'none';
            frame-src https://accept.paymob.com https://accept.paymobsandbox.com;
            manifest-src 'self' blob:;
            base-uri 'self';
        " always;
    }
}
