# CourtZon Production Nginx Config (TLS / Let's Encrypt)
# Deploy on the Hostinger VPS in front of Coolify containers.
# Certbot manages the SSL certificates.

# ── HTTP → HTTPS redirect ──
server {
    listen 80;
    listen [::]:80;
    server_name courtzon.com www.courtzon.com api.courtzon.com;
    return 301 https://$host$request_uri;
}

# ── Frontend (courtzon.com + www.courtzon.com) ──
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name courtzon.com www.courtzon.com;

    ssl_certificate /etc/letsencrypt/live/courtzon.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/courtzon.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "payment=(self \"https://accept.paymob.com\" \"https://accept.paymobsandbox.com\")" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # CSP — same-origin API proxy, Paymob, fonts
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com blob:; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com https://fonts.googleapis.com https://cdn.jsdelivr.net; connect-src 'self' https://accept.paymob.com https://accept.paymobsandbox.com; form-action 'self'; frame-ancestors 'none'; manifest-src 'self' blob:; base-uri 'self'; upgrade-insecure-requests" always;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets — 1 year cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy to backend
    location ~ ^/(auth|organisations|organisation-types|branches|resources|sports|resource-types|amenities|banks|bank-branches|subscription-plans|subscription-features|bookings|marketplace|wallets|payments|settlements|rbac|roles|permissions|permission-modules|admin|feature-flags|user-roles|users|my|settings|countries|provinces|cities|currencies|languages|translations|player-levels|ads|upload|uploads|activities|community|cms|coaches|public|health|sidebar|ui-permissions|notifications|notification-preferences|booking-invitations|cancellation-policies|matches|academies|tournaments|sessions|org|design-tokens|reports|docs|openapi\.json|metrics)(/|$|\?) {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ── API (api.courtzon.com) — direct backend access for webhooks ──
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.courtzon.com;

    ssl_certificate /etc/letsencrypt/live/courtzon.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/courtzon.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # All requests proxy to backend
    location / {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
