# API proxy prefixes — mirrors vite.config.ts proxy config
# Each prefix proxies to backend:3000 (no trailing slash to avoid nginx 301 redirect)

# ── SPA deep-link overrides — serve index.html for known React page routes ──
# These must come BEFORE the generic proxy location blocks (Nginx uses longest prefix match)

# ── SPA deep-link overrides that ALSO serve as API endpoints ──
# These use Accept-header routing: browser nav → index.html, API call → proxy to backend
# See nginx.conf for $is_api_request map definition

location = /marketplace                                   { try_files /index.html =404; }
location /marketplace/products/       { if ($is_api_request = "spa") { rewrite ^ /index.html last; } proxy_pass http://backend:3000; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_cache_bypass $http_upgrade; }
location /marketplace/cart            { if ($is_api_request = "spa") { rewrite ^ /index.html last; } proxy_pass http://backend:3000; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_cache_bypass $http_upgrade; }
location /marketplace/checkout                              { try_files /index.html =404; }
location /marketplace/orders/         { if ($is_api_request = "spa") { rewrite ^ /index.html last; } proxy_pass http://backend:3000; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_cache_bypass $http_upgrade; }
location /marketplace/seller          { if ($is_api_request = "spa") { rewrite ^ /index.html last; } proxy_pass http://backend:3000; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_cache_bypass $http_upgrade; }
location /marketplace/player/         { if ($is_api_request = "spa") { rewrite ^ /index.html last; } proxy_pass http://backend:3000; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_cache_bypass $http_upgrade; }

# ── Bare-prefix proxies for paths with Accept-header SPA overrides ──
# These prevent nginx try_files 301 redirect ($uri/ normalization in location /)
# when a trailing-slash SPA override exists. E.g. /marketplace/products →
# 301 /marketplace/products/ → accept-header check. This eliminates the round-trip.
location /marketplace/products        { proxy_pass http://backend:3000; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_cache_bypass $http_upgrade; }
location /marketplace/orders          { proxy_pass http://backend:3000; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_cache_bypass $http_upgrade; }
location /marketplace/player          { proxy_pass http://backend:3000; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_cache_bypass $http_upgrade; }

