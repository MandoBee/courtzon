# API proxy prefixes — mirrors vite.config.ts proxy config
# Each prefix proxies to backend:3000 (no trailing slash to avoid nginx 301 redirect)

location /organisations           { proxy_pass http://backend:3000; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_cache_bypass $http_upgrade; }
