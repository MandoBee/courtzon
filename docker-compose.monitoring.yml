# Prometheus + Grafana + Node Exporter — joins the courtzon network to scrape backend:3000/metrics
# Prerequisite: main stack running (docker compose up -d)
# Usage: docker compose -f docker-compose.monitoring.yml up -d
name: courtzon-monitoring

services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: courtzon-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - courtzon

  grafana:
    image: grafana/grafana:11.4.0
    container_name: courtzon-grafana
    restart: unless-stopped
    volumes:
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    depends_on:
      - prometheus
    networks:
      - courtzon

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: courtzon-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    networks:
      - courtzon

networks:
  courtzon:
    external: true
    name: courtzon

volumes:
  prometheus_data:
  grafana_data:
