name: courtzon

services:
  mysql:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: courtzon-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PUBLISH_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-courtzon_v3}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    deploy:
      resources:
        limits:
          cpus: "${MYSQL_CPU_LIMIT:-2.0}"
          memory: "${MYSQL_MEM_LIMIT:-1G}"
        reservations:
          cpus: "${MYSQL_CPU_RESERVE:-0.5}"
          memory: "${MYSQL_MEM_RESERVE:-512M}"

  redis:
    image: redis:7-alpine
    container_name: courtzon-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: sh -c 'exec redis-server --maxmemory 512mb --maxmemory-policy noeviction --appendonly yes --appendfsync everysec ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}'
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ${REDIS_PASSWORD:+-a \"$REDIS_PASSWORD\"} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          cpus: "${REDIS_CPU_LIMIT:-1.0}"
          memory: "${REDIS_MEM_LIMIT:-512M}"
        reservations:
          cpus: "${REDIS_CPU_RESERVE:-0.25}"
          memory: "${REDIS_MEM_RESERVE:-256M}"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: courtzon-backend
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RELAX_RATE_LIMIT: "true"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
      - backend_backups:/app/backups
    deploy:
      resources:
        limits:
          cpus: "${BACKEND_CPU_LIMIT:-2.0}"
          memory: "${BACKEND_MEM_LIMIT:-512M}"
        reservations:
          cpus: "${BACKEND_CPU_RESERVE:-0.5}"
          memory: "${BACKEND_MEM_RESERVE:-256M}"


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_PAYMOB_PUBLIC_KEY: ${VITE_PAYMOB_PUBLIC_KEY:-}
    container_name: courtzon-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "${FRONTEND_CPU_LIMIT:-1.0}"
          memory: "${FRONTEND_MEM_LIMIT:-256M}"
        reservations:
          cpus: "${FRONTEND_CPU_RESERVE:-0.25}"
          memory: "${FRONTEND_MEM_RESERVE:-128M}"

  # ── Monitoring (optional: docker compose --profile monitoring up) ──
  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: courtzon-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    profiles:
      - monitoring
    deploy:
      resources:
        limits:
          memory: "${PROMETHEUS_MEM_LIMIT:-256M}"

  grafana:
    image: grafana/grafana:11.5.2
    container_name: courtzon-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-admin}"
      GF_INSTALL_PLUGINS: ""
    volumes:
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    profiles:
      - monitoring
    deploy:
      resources:
        limits:
          memory: "${GRAFANA_MEM_LIMIT:-256M}"

networks:
  default:
    name: courtzon

volumes:
  mysql_data:
  redis_data:
  backend_backups:
  prometheus_data:
  grafana_data:
