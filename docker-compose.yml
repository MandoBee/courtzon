# Full production-style stack: MySQL + Redis + backend + frontend (Nginx SPA)
# Env: project root `.env` via env_file (never baked into images — see G5)
name: courtzon

services:
  mysql:
    image: mysql:8.0
    container_name: courtzon-mysql
    restart: unless-stopped
    profiles: ["db"]
    ports:
      - "${MYSQL_PUBLISH_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-courtzon_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-courtzon_v2}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-courtzon_root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: courtzon-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: sh -c 'exec redis-server --maxmemory 512mb --maxmemory-policy noeviction --appendonly yes --appendfsync everysec ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}'
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ${REDIS_PASSWORD:+-a \"$REDIS_PASSWORD\"} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: courtzon-backend
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-3306}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Local Docker stack only — omit ENABLE_API_DOCS in real production
      ENABLE_API_DOCS: ${ENABLE_API_DOCS:-true}
      RELAX_RATE_LIMIT: "true"
      METRICS_TOKEN: ${METRICS_TOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health',r=>{let d='';r.on('data',c=>d+=c);r.on('end',()=>{try{const j=JSON.parse(d);process.exit(j.status==='down'?1:0)}catch{process.exit(1)}})}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      # Bind mount so uploads survive rebuilds and are visible under backend/uploads/
      - ./backend/uploads:/app/uploads
      - backend_backups:/app/backups
      - ./backend/docker-entrypoint.sh:/usr/local/bin/docker-entrypoint.sh:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_PAYMOB_PUBLIC_KEY: ${VITE_PAYMOB_PUBLIC_KEY:-egy_pk_test_CwrbJgzrZ6ZU2l2ZWqkSrQg0tYHhF2pl}
    container_name: courtzon-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_URL: ${VITE_API_URL:-}

networks:
  default:
    name: courtzon

volumes:
  mysql_data:
  redis_data:
  backend_backups:
