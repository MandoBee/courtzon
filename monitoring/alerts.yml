# CourtZon Prometheus Alerting Rules
# Deploy to: monitoring/alerts.yml
# Reference: https://prometheus.io/docs/prometheus/latest/configuration/alerting_rules/

groups:
  - name: courtzon-backend
    interval: 30s
    rules:
      # ── Critical: Backend down ──
      - alert: BackendDown
        expr: up{job="courtzon-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend is down"
          description: "CourtZon backend has been down for more than 1 minute."

      # ── Critical: High 500 error rate ──
      - alert: HighErrorRate
        expr: |
          rate(courtzon_http_requests_total{status_code=~"5.."}[5m])
          / rate(courtzon_http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate ({{ $value | humanizePercentage }})"
          description: "More than 5% of requests are returning 5xx errors for 5 minutes."

      # ── Warning: Elevated 500 errors ──
      - alert: ElevatedErrors
        expr: rate(courtzon_http_requests_total{status_code=~"5.."}[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Elevated 5xx errors ({{ $value }} req/s)"

      # ── Warning: High response latency ──
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95,
            rate(courtzon_http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency ({{ $value }}s)"
          description: "95th percentile response time is above 2 seconds."

      # ── Critical: High memory usage ──
      - alert: HighMemoryUsage
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage ({{ $value | humanizePercentage }})"
          description: "Memory usage is above 85% for 5 minutes."

      # ── Critical: Disk space low ──
      - alert: LowDiskSpace
        expr: |
          (1 - (node_filesystem_avail_bytes{mountpoint="/"} 
            / node_filesystem_size_bytes{mountpoint="/"})) > 0.85
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Low disk space ({{ $value | humanizePercentage }} used)"
          description: "Disk usage is above 85%."

      # ── Warning: High CPU usage ──
      - alert: HighCPU
        expr: |
          (1 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m]))) > 0.80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage ({{ $value | humanizePercentage }})"
