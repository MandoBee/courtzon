global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: "courtzon-backend"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["backend:3000"]
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "courtzon_.*"
        action: keep

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
