name: CourtZon CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & TypeCheck
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        workspace: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: ${{ matrix.workspace }}/package-lock.json
      - run: npm ci
        working-directory: ${{ matrix.workspace }}
      - run: npm run build --if-present
        working-directory: ${{ matrix.workspace }}

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-24.04
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_DATABASE: courtzon_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npx vitest run --reporter=verbose
        working-directory: backend
        env:
          NODE_ENV: test
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: testpass
          DB_NAME: courtzon_test
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          SESSION_SECRET: ci-test-session-secret-32-chars-long!!

  docker-build:
    name: Docker Build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build backend frontend
      - run: docker compose up -d
      - run: sleep 10
      - run: docker compose ps
      - run: curl -f http://localhost:3000/health || exit 1
      - run: docker compose down
